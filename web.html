<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Peer Stream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 10px; background: #000; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .menu { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }
        input { padding: 12px; border-radius: 5px; border: none; }
        button { padding: 12px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: #28a745; color: white; }
        .btn-join { background: #007bff; color: white; }
        #peer-id-display { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Live Camera Stream</h2>
    <p id="peer-id-display">Status: Initializing...</p>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted style="width: 150px; position: fixed; bottom: 20px; right: 20px; border: 2px solid white;"></video>

    <div class="menu">
        <input type="text" id="remote-id-input" placeholder="Enter Friend's ID to View">
        <button class="btn-join" onclick="joinStream()">Connect & View</button>
        <hr style="width:100%; border: 0.5px solid #333;">
        <button class="btn-start" onclick="startBroadcasting()">Start My Broadcast</button>
    </div>

    <script>
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const peerIdDisplay = document.getElementById('peer-id-display');
        const remoteIdInput = document.getElementById('remote-id-input');

        // 1. Initialize Peer
        const peer = new Peer(); 

        // Display your ID so you can share it
        peer.on('open', (id) => {
            peerIdDisplay.innerText = "Your ID: " + id;
        });

        // 2. Handle Incoming Calls (For the Viewer)
        peer.on('call', (call) => {
            call.answer(); // Answer without sending your own stream back
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
            });
        });

        // 3. Broadcaster Function: Start Camera and Wait for Callers
        async function startBroadcasting() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, // Uses back camera if available
                    audio: true 
                });
                localVideo.srcObject = stream;

                // When someone calls us, send them the stream
                peer.on('call', (call) => {
                    call.answer(stream);
                    call.on('stream', (remoteStream) => {
                        remoteVideo.srcObject = remoteStream;
                    });
                });
                
                alert("Broadcast started! Give your ID to the other phone.");
            } catch (err) {
                console.error("Failed to get local stream", err);
                alert("Camera access denied.");
            }
        }

        // 4. Viewer Function: Connect to the Broadcaster
        function joinStream() {
            const remoteId = remoteIdInput.value;
            if (!remoteId) return alert("Please enter an ID");

            // We call the peer, but we don't need to send our own camera (null)
            const call = peer.call(remoteId, null);
            
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
            });

            call.on('error', (err) => {
                console.error(err);
                alert("Connection failed.");
            });
        }
    </script>
</body>
</html>
