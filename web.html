<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - Firstian Technology</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Menggunakan style yang sudah Anda miliki sebelumnya */
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; 
            --accent-blue-main: #00d2ff; --accent-red-main: #ff1a1a;
            --text-main: #e6edf3; --text-dim: #8b949e;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        .step-card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .status-badge { display: inline-block; font-size: 0.7rem; font-weight: bold; padding: 4px 12px; border-radius: 4px; border: 1px solid var(--accent-blue-main); color: var(--accent-blue-main); text-transform: uppercase; margin-bottom: 15px; }
        
        /* Camera UI */
        .video-container { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .cam-overlay { position: absolute; top: 10px; left: 10px; color: #00ff00; font-family: monospace; font-size: 0.8rem; text-shadow: 1px 1px 2px #000; }
        .btn-connect { width: 100%; background: transparent; border: 1px solid var(--accent-blue-main); color: var(--accent-blue-main); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }
        .btn-connect:hover { background: var(--accent-blue-main); color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>PROJECT COMMAND CENTER</h1>

    <div class="step-card" id="camera-module">
        <div class="status-badge">Live Internet Stream</div>
        <h3>Site Monitoring - Remote</h3>
        
        <div class="video-container">
            <div class="cam-overlay" id="cam-status">● DISCONNECTED</div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <button class="btn-connect" onclick="startMonitoring()">Connect to Site Camera</button>
    </div>

    <div id="workflow-area"></div>
</div>

<script>
    // ID harus SAMA dengan yang ada di camera.html
    const TARGET_CAMERA_ID = 'FIRSTIAN-TECH-CAM-01'; 
    const peer = new Peer(); 

    function startMonitoring() {
        const statusEl = document.getElementById('cam-status');
        statusEl.innerText = "● CONNECTING...";
        statusEl.style.color = "yellow";

        // Memanggil kamera lewat internet
        const call = peer.call(TARGET_CAMERA_ID, null);

        call.on('stream', (remoteStream) => {
            console.log("Stream diterima!");
            document.getElementById('remoteVideo').srcObject = remoteStream;
            statusEl.innerText = "● LIVE - REMOTE SITE";
            statusEl.style.color = "#00ff00";
        });

        call.on('error', (err) => {
            statusEl.innerText = "● FAILED: " + err;
            statusEl.style.color = "red";
        });
    }

    // PeerJS Global Error Handler
    peer.on('error', (err) => {
        if(err.type === 'peer-disconnected') {
            document.getElementById('cam-status').innerText = "● OFFLINE";
            document.getElementById('cam-status').style.color = "red";
        }
    });
</script>

</body>
</html>
