<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Camera Fix - WebRTC</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        video {
            width: 100%;
            background: #000;
            border-radius: 10px;
            margin-top: 10px;
            border: 2px solid #333;
        }
        .id-display {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.1em;
            color: #00e676;
            margin: 10px 0;
            word-break: break-all;
            user-select: all;
        }
        input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #2196F3;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .status { font-size: 0.8em; margin-top: 10px; color: #bbb; }
        h3 { margin-bottom: 5px; font-size: 1em; color: #2196F3; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Internet Camera Stream</h2>
        
        <p>ID Unik Anda (Berikan ke teman):</p>
        <div id="my-id" class="id-display">Sedang memuat ID...</div>
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">

        <input type="text" id="remote-id" placeholder="Masukkan ID teman di sini">
        <button onclick="connectToPeer()">Hubungkan & Lihat Kamera</button>
        <div id="status-text" class="status">Menyiapkan sistem...</div>

        <h3>Kamera Saya</h3>
        <video id="localVideo" autoplay muted playsinline></video>

        <h3>Kamera Remote</h3>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
        let localStream;
        const statusText = document.getElementById('status-text');
        const remoteVideo = document.getElementById('remoteVideo');

        // KONFIGURASI PEERJS DENGAN TURN SERVER (PENTING UNTUK INTERNET/DATA SELULER)
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    // TURN Server gratis untuk membantu menembus firewall ISP
                    { 
                        urls: 'turn:openrelay.metered.ca:80',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    },
                    { 
                        urls: 'turn:openrelay.metered.ca:443',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    }
                ],
                'sdpSemantics': 'unified-plan'
            }
        });

        // 1. Inisialisasi Kamera Lokal
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 }, 
                    audio: true 
                });
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                statusText.innerText = "Kamera lokal siap.";
            } catch (err) {
                console.error("Akses kamera ditolak:", err);
                statusText.innerText = "Gagal akses kamera: " + err.message;
            }
        }

        // 2. Saat ID Peer Berhasil Dibuat
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            statusText.innerText = "Online - Siap menerima panggilan.";
        });

        // 3. Menangani Panggilan Masuk
        peer.on('call', (call) => {
            statusText.innerText = "Panggilan masuk...";
            call.answer(localStream); // Balas dengan stream kita
            
            call.on('stream', (incomingStream) => {
                remoteVideo.srcObject = incomingStream;
                remoteVideo.onloadedmetadata = () => remoteVideo.play();
                statusText.innerText = "Tersambung (Menerima)!";
            });
        });

        // 4. Fungsi Menghubungi ID Lain
        function connectToPeer() {
            const rId = document.getElementById('remote-id').value;
            if (!rId) return alert("Masukkan ID tujuan!");
            if (!localStream) return alert("Kamera Anda belum aktif!");

            statusText.innerText = "Menghubungi " + rId + "...";
            const call = peer.call(rId, localStream);
            
            call.on('stream', (incomingStream) => {
                remoteVideo.srcObject = incomingStream;
                // Paksa play jika browser memblokir autoplay
                remoteVideo.onloadedmetadata = () => {
                    remoteVideo.play().catch(e => console.log("Play error:", e));
                };
                statusText.innerText = "Tersambung (Memanggil)!";
            });

            call.on('error', (err) => {
                statusText.innerText = "Error panggilan: " + err;
            });
        }

        // Handle error umum PeerJS
        peer.on('error', (err) => {
            console.error("PeerJS Error:", err);
            statusText.innerText = "Koneksi Error: " + err.type;
        });

        // Jalankan kamera saat start
        initCamera();
    </script>
</body>
</html>
