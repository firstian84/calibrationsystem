<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Loop dengan Delay 10 Detik</title>
    <style>
        /* Overlay hitam untuk memicu interaksi user agar browser mengizinkan audio */
        #interaction-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="interaction-overlay">Klik di mana saja untuk memutar audio</div>

    <audio id="myAudio" crossorigin="anonymous">
        <source src="https://docs.google.com/uc?export=open&id=1L1zRuQCLl52KhRobGK25y35zVwVBXrxF" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const overlay = document.getElementById('interaction-overlay');
        const delayBetweenLoops = 10000; // Jeda 10 detik sebelum putaran berikutnya

        // Fungsi yang mengatur delay 10 detik SELESAI putaran pertama, kedua, dst.
        function setupDelayedLoop() {
            audio.addEventListener('ended', function() {
                console.log("Audio selesai diputar. Menunggu 10 detik...");
                
                setTimeout(function() {
                    audio.currentTime = 0; // Kembalikan track audio ke awal (detik 0)
                    console.log("Memutar ulang audio (Putaran berikutnya)...");
                    audio.play().catch(err => console.log("Gagal memutar ulang:", err));
                }, delayBetweenLoops); // Delay 10 detik hanya dieksekusi di sini
            });
        }

        // Trigger utama saat halaman dimuat (onload)
        window.onload = function() {
            overlay.addEventListener('click', function() {
                // Sembunyikan overlay setelah diklik
                overlay.style.display = 'none';

                // Aktifkan sistem hitung mundur untuk putaran berikutnya
                setupDelayedLoop();

                // LANGSUNG putar audio saat ini juga (Putaran Pertama TANPA delay)
                console.log("Memicu putaran pertama (Langsung tanpa delay)...");
                audio.play()
                    .then(() => console.log("Putaran pertama berhasil berbunyi!"))
                    .catch(err => {
                        console.error("Gagal memutar audio awal:", err);
                        alert("Gagal memutar audio. Pastikan file Google Drive Anda disetel 'Anyone with the link can view'.");
                    });
            });
        };
    </script>

</body>
</html>
