<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary: #00f2fe;
            --accent: #ff3b3b;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            color: white;
            padding: 20px;
        }

        .container { 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            padding: 30px; 
            width: 100%;
            max-width: 400px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* Lock Screen Style */
        #lock-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { 
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .form-group {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 18px;
            padding: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .canvas-box {
            background: white;
            border-radius: 12px;
            margin: 10px 0;
            overflow: hidden;
        }

        #sig-canvas { width: 100%; height: 140px; cursor: crosshair; }

        .btn { 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-main { background: linear-gradient(90deg, #00f2fe, #4facfe); color: #000; }
        .btn-yt { background: #ff0000; color: #fff; }
        .btn-clear { background: none; color: var(--accent); font-size: 11px; padding: 5px; width: auto; }
        
        .photo-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .btn-sub {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 12px;
            padding: 10px;
            border-radius: 10px;
            flex: 1;
        }

        .preview-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .hidden { display: none !important; }
        #status-msg { font-size: 12px; margin-top: 15px; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="lock-screen">
        <i class="fab fa-youtube" style="font-size: 50px; color: #ff0000;"></i>
        <h2>Wajib Subscribe</h2>
        <p style="font-size: 13px; color: #aaa;">Silakan subscribe channel kami untuk membuka form Project Order.</p>
        <a href="https://youtube.com/@miftah_gaming?si=K-7Ea8K3t0vT3oVq" target="_blank" class="btn btn-yt" onclick="unlockContent()">
            <i class="fab fa-youtube"></i> Subscribe Sekarang
        </a>
    </div>

    <div id="main-content" class="hidden">
        <h2>Project Order</h2>
        
        <div id="step-1">
            <div class="form-group">
                <input type="text" id="clientName" placeholder="Nama Lengkap">
                <input type="number" id="clientWA" placeholder="Nomor WhatsApp">
                
                <input type="text" id="projectNeed" placeholder="Kebutuhan Proyek">
                <textarea id="projectDetails" placeholder="Rincian Pekerjaan"></textarea>
                <input type="number" id="projectBudget" placeholder="Anggaran (Rp)">

                <label style="font-size: 11px; color: #aaa;">Tanda Tangan Digital:</label>
                <div class="canvas-box">
                    <canvas id="sig-canvas"></canvas>
                </div>
                <button class="btn btn-clear" onclick="sigPad.clear()">Hapus Tanda Tangan</button>

                <label style="font-size: 11px; color: #aaa; display: block; margin-top: 10px;">Foto Verifikasi:</label>
                <div class="photo-actions">
                    <button class="btn btn-sub" onclick="document.getElementById('photoCam').click()">
                        <i class="fas fa-camera"></i> Kamera
                    </button>
                    <button class="btn btn-sub" onclick="document.getElementById('photoGal').click()">
                        <i class="fas fa-image"></i> Galeri
                    </button>
                </div>
                
                <input type="file" id="photoCam" accept="image/*" capture="user" class="hidden" onchange="handlePhoto(this)">
                <input type="file" id="photoGal" accept="image/*" class="hidden" onchange="handlePhoto(this)">
                
                <img id="imgPreview" class="preview-img" alt="Pratinjau Foto">
            </div>

            <button class="btn btn-main" onclick="submitProject()">Kirim Project Order</button>
        </div>

        <div id="step-2" class="hidden">
            <div class="form-group" style="text-align: center;">
                <i class="fas fa-sync fa-spin" style="font-size: 30px; color: var(--primary);"></i>
                <p id="status-msg">Menunggu Verifikasi Admin...</p>
                <div id="final-link" class="hidden">
                    <a href="#" id="access-btn" class="btn btn-main" style="display: block; text-decoration: none;">Akses Project</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: "https://enabled-crayfish-71186.upstash.io",
        TOKEN: "gQAAAAAAARYSAAIncDE2MzUzMjQ5Mzg2N2E0YzU2OTUxODJjZWNmY2E2NzkyMXAxNzExODY",
        PREFIX: "project_order_v2_",
        ADMIN_WA: "6287796126529"
    };

    let sigPad;

    window.onload = () => {
        const canvas = document.getElementById('sig-canvas');
        sigPad = new SignaturePad(canvas);
        
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    };

    function unlockContent() {
        // Memberi jeda sedikit agar user merasa beralih setelah klik subscribe
        setTimeout(() => {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }, 1000);
    }

    function handlePhoto(input) {
        const preview = document.getElementById('imgPreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                preview.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function submitProject() {
        const name = document.getElementById('clientName').value;
        const wa = document.getElementById('clientWA').value;
        const need = document.getElementById('projectNeed').value;
        const details = document.getElementById('projectDetails').value;
        const budget = document.getElementById('projectBudget').value;
        const photo = document.getElementById('imgPreview').src;

        if(!name || !wa || !need || !details || !budget || sigPad.isEmpty() || !photo) {
            return alert("Harap lengkapi semua data, foto, dan tanda tangan!");
        }

        // Data payload tanpa foto (karena foto dikirim ke WA)
        const payload = {
            id: "PRJ-" + Math.floor(Math.random() * 10000),
            client: name,
            contact: wa,
            project_need: need,
            project_details: details,
            budget: budget,
            status: "pending",
            docs: {
                signature: sigPad.toDataURL()
                // photo tidak dikirim ke upstash sesuai permintaan
            },
            created_at: new Date().toISOString()
        };

        try {
            // 1. Simpan data teks ke Upstash
            const res = await fetch(`${CONFIG.URL}/set/${CONFIG.PREFIX}${wa}`, {
                headers: { Authorization: `Bearer ${CONFIG.TOKEN}` },
                method: 'POST',
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                // 2. Kirim Verifikasi ke WhatsApp Admin
                const msg = `HALO ADMIN, SAYA INGIN VERIFIKASI PROJECT ORDER:%0A%0A` +
                            `Nama: ${name}%0A` +
                            `WhatsApp: ${wa}%0A` +
                            `Kebutuhan: ${need}%0A` +
                            `Anggaran: Rp ${budget}%0A%0A` +
                            `*Silakan cek foto verifikasi yang saya lampirkan.*`;
                
                // Membuka WhatsApp dengan teks pesan
                window.open(`https://wa.me/${CONFIG.ADMIN_WA}?text=${msg}`, '_blank');

                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                startTracking(wa);
            }
        } catch (e) { alert("Gagal mengirim data!"); }
    }

    function startTracking(wa) {
        const check = setInterval(async () => {
            try {
                const res = await fetch(`${CONFIG.URL}/get/${CONFIG.PREFIX}${wa}`, {
                    headers: { Authorization: `Bearer ${CONFIG.TOKEN}` }
                });
                const data = await res.json();
                
                if (data.result) {
                    const project = JSON.parse(data.result);
                    if (project.status === "verified") {
                        clearInterval(check);
                        document.getElementById('status-msg').innerText = "Project Terverifikasi!";
                        document.getElementById('final-link').classList.remove('hidden');
                        if(project.link) document.getElementById('access-btn').href = project.link;
                        alert("Verifikasi Sukses!");
                    }
                }
            } catch (e) { console.log("Checking..."); }
        }, 4000);
    }
</script>

</body>
</html>
