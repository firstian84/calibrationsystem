<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Chat Tanpa WebSocket</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #chat-box { height: 300px; background: white; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; padding: 5px; border-bottom: 1px solid #eee; }
        input { padding: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2>Public Chat (Polling Method)</h2>
    <div id="chat-box">Memuat pesan...</div>
    
    <input type="text" id="user" placeholder="Nama">
    <input type="text" id="text" placeholder="Pesan">
    <button onclick="kirimPesan()">Kirim</button>

    <script>
        // GANTI DENGAN DATA DARI JSONBIN.IO
        const BIN_ID = 'ID_BIN_KAMU';
        const API_KEY = '$2b$10$KEY_KAMU';
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // 1. Fungsi Mengambil Pesan
        async function muatPesan() {
            try {
                let res = await fetch(URL + '/latest', {
                    headers: { 'X-Master-Key': API_KEY }
                });
                let data = await res.json();
                
                let html = '';
                data.record.forEach(m => {
                    html += `<div class="msg"><b>${m.user}:</b> ${m.text}</div>`;
                });
                document.getElementById('chat-box').innerHTML = html;
            } catch (e) { console.error("Gagal memuat", e); }
        }

        // 2. Fungsi Mengirim Pesan
        async function kirimPesan() {
            const user = document.getElementById('user').value;
            const text = document.getElementById('text').value;
            if(!user || !text) return;

            // Ambil data lama dulu
            let res = await fetch(URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
            let currentData = await res.json();
            let messages = currentData.record;

            // Tambah pesan baru
            messages.push({ user, text });

            // Simpan kembali
            await fetch(URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(messages)
            });

            document.getElementById('text').value = '';
            muatPesan();
        }

        // Jalankan polling setiap 3 detik
        setInterval(muatPesan, 3000);
        muatPesan();
    </script>
</body>
</html>
