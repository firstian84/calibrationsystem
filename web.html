<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera Stream</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        video {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #000;
            transform: scaleX(-1); /* Mirror effect agar seperti cermin */
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            font-size: 0.9em;
            color: #4caf50;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Live Camera Stream</h2>
        <video id="videoElement" autoplay playsinline></video>
        <div id="status" class="status">Menghubungkan ke kamera...</div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const statusText = document.getElementById('status');

        async function startCamera() {
            try {
                // Meminta akses ke video saja
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: false 
                });
                
                // Menghubungkan stream kamera ke elemen video
                video.srcObject = stream;
                statusText.innerText = "Kamera Aktif";
            } catch (err) {
                console.error("Error mengakses kamera: ", err);
                statusText.innerText = "Gagal mengakses kamera. Pastikan izin diberikan.";
                statusText.style.color = "#ff5252";
            }
        }

        // Jalankan fungsi saat halaman dimuat
        window.addEventListener('load', startCamera);
    </script>

</body>
</html>
