<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary: #00f2fe;
            --accent: #ff3b3b;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            color: white;
            padding: 20px;
        }

        .container { 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            padding: 30px; 
            width: 100%;
            max-width: 400px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h2 { 
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .form-group {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 18px;
            padding: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .canvas-box {
            background: white;
            border-radius: 12px;
            margin: 10px 0;
            overflow: hidden;
        }

        #sig-canvas { width: 100%; height: 140px; cursor: crosshair; }

        .btn { 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-main { background: linear-gradient(90deg, #00f2fe, #4facfe); color: #000; }
        .btn-clear { background: none; color: var(--accent); font-size: 11px; padding: 5px; }

        .preview-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .hidden { display: none; }
        #status-msg { font-size: 12px; margin-top: 15px; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2>Project Order</h2>
    
    <div id="step-1">
        <div class="form-group">
            <input type="text" id="clientName" placeholder="Nama Lengkap">
            <input type="number" id="clientWA" placeholder="Nomor WhatsApp">
            
            <input type="text" id="projectNeed" placeholder="Kebutuhan Proyek">
            <textarea id="projectDetails" placeholder="Rincian Pekerjaan"></textarea>
            <input type="number" id="projectBudget" placeholder="Anggaran (Rp)">

            <label style="font-size: 11px; color: #aaa;">Tanda Tangan Digital:</label>
            <div class="canvas-box">
                <canvas id="sig-canvas"></canvas>
            </div>
            <button class="btn-clear" onclick="sigPad.clear()">Hapus Tanda Tangan</button>

            <label style="font-size: 11px; color: #aaa; display: block; margin-top: 10px;">Foto Verifikasi (Pegang HP+perlihatan aplikasi):</label>
            <input type="file" id="clientPhoto" accept="image/*" capture="user" onchange="handlePhoto(this)">
            
            <img id="imgPreview" class="preview-img" alt="Pratinjau Foto">
        </div>

        <button class="btn btn-main" onclick="submitProject()">Kirim Project Order</button>
    </div>

    <div id="step-2" class="hidden">
        <div class="form-group" style="text-align: center;">
            <i class="fas fa-sync fa-spin" style="font-size: 30px; color: var(--primary);"></i>
            <p id="status-msg">Menunggu Verifikasi Admin...</p>
            <div id="final-link" class="hidden">
                <a href="#" id="access-btn" class="btn btn-main" style="display: block; text-decoration: none;">Akses Project</a>
            </div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: "https://enabled-crayfish-71186.upstash.io",
        TOKEN: "gQAAAAAAARYSAAIncDE2MzUzMjQ5Mzg2N2E0YzU2OTUxODJjZWNmY2E2NzkyMXAxNzExODY",
        PREFIX: "project_order_v2_" // Database baru
    };

    let sigPad;

    window.onload = () => {
        const canvas = document.getElementById('sig-canvas');
        sigPad = new SignaturePad(canvas);
        
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    };

    // Fungsi untuk menampilkan hasil foto segera setelah dipotret/dipilih
    function handlePhoto(input) {
        const preview = document.getElementById('imgPreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block'; // Menampilkan elemen gambar
                // Scroll otomatis ke hasil foto agar user melihatnya
                preview.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function submitProject() {
        const name = document.getElementById('clientName').value;
        const wa = document.getElementById('clientWA').value;
        const need = document.getElementById('projectNeed').value;
        const details = document.getElementById('projectDetails').value;
        const budget = document.getElementById('projectBudget').value;
        const photo = document.getElementById('imgPreview').src;

        if(!name || !wa || !need || !details || !budget || sigPad.isEmpty() || !photo || photo.includes('window.location')) {
            return alert("Harap lengkapi semua data, foto, dan tanda tangan!");
        }

        const payload = {
            id: "PRJ-" + Math.floor(Math.random() * 10000),
            client: name,
            contact: wa,
            project_need: need,
            project_details: details,
            budget: budget,
            status: "pending",
            docs: {
                signature: sigPad.toDataURL(),
                photo: photo
            },
            created_at: new Date().toISOString()
        };

        try {
            const res = await fetch(`${CONFIG.URL}/set/${CONFIG.PREFIX}${wa}`, {
                headers: { Authorization: `Bearer ${CONFIG.TOKEN}` },
                method: 'POST',
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                startTracking(wa);
            }
        } catch (e) { alert("Gagal mengirim data!"); }
    }

    function startTracking(wa) {
        const check = setInterval(async () => {
            try {
                const res = await fetch(`${CONFIG.URL}/get/${CONFIG.PREFIX}${wa}`, {
                    headers: { Authorization: `Bearer ${CONFIG.TOKEN}` }
                });
                const data = await res.json();
                
                if (data.result) {
                    const project = JSON.parse(data.result);
                    if (project.status === "verified") {
                        clearInterval(check);
                        document.getElementById('status-msg').innerText = "Project Terverifikasi!";
                        document.getElementById('final-link').classList.remove('hidden');
                        if(project.link) document.getElementById('access-btn').href = project.link;
                        alert("Verifikasi Sukses!");
                    }
                }
            } catch (e) { console.log("Checking..."); }
        }, 4000);
    }
</script>

</body>
</html>
