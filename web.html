<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Camera - WebRTC</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        video {
            width: 100%;
            background: #000;
            border-radius: 10px;
            margin-top: 10px;
            border: 2px solid #333;
        }

        .id-display {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.2em;
            color: #00e676;
            margin: 10px 0;
            word-break: break-all;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #2196F3;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #1976D2; }
        .status { font-size: 0.8em; margin-top: 5px; color: #bbb; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Camera Stream</h2>
        
        <p>ID Unik Anda:</p>
        <div id="my-id" class="id-display">Mendapatkan ID...</div>
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">

        <input type="text" id="remote-id" placeholder="Masukkan ID Perangkat Lain">
        <button onclick="connectToPeer()">Lihat Kamera Mereka</button>
        <div id="status-text" class="status">Siap menghubungkan</div>

        <h3>Kamera Saya</h3>
        <video id="localVideo" autoplay muted playsinline></video>

        <h3>Kamera Remote</h3>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
        let localStream;
        const statusText = document.getElementById('status-text');

        // Konfigurasi PeerJS dengan Google STUN Server agar bisa lewat Internet
        const peer = new Peer({
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        // 1. Ambil akses kamera lokal
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                console.log("Kamera lokal aktif");
            } catch (err) {
                console.error("Gagal akses kamera:", err);
                alert("Mohon izinkan akses kamera!");
            }
        }

        // 2. Saat Peer terbuka, tampilkan ID-nya
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            statusText.innerText = "Online - Menunggu koneksi";
        });

        // 3. Menangani PANGGILAN MASUK (Saat orang lain ingin melihat kamera kita)
        peer.on('call', (call) => {
            statusText.innerText = "Menerima panggilan...";
            call.answer(localStream); // Kirim balik video kita
            
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
                statusText.innerText = "Tersambung!";
            });
        });

        // 4. Fungsi untuk MENGHUBUNGI perangkat lain
        function connectToPeer() {
            const remoteId = document.getElementById('remote-id').value;
            if (!remoteId) return alert("Masukkan ID dulu!");

            statusText.innerText = "Menghubungi: " + remoteId;
            
            const call = peer.call(remoteId, localStream);
            
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
                statusText.innerText = "Tersambung!";
            });

            call.on('error', (err) => {
                console.error(err);
                statusText.innerText = "Gagal menyambung.";
            });
        }

        // Jalankan kamera saat halaman dibuka
        initCamera();

        // Handle error global PeerJS
        peer.on('error', (err) => {
            console.error("PeerJS Error:", err.type);
            statusText.innerText = "Error: " + err.type;
        });
    </script>
</body>
</html>
