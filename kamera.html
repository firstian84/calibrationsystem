<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Video Call - Simple</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 800px;
        }
        video {
            width: 100%;
            background: #000;
            border-radius: 8px;
            border: 2px solid #333;
        }
        .controls {
            margin-bottom: 20px;
            background: #333;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            padding: 8px;
            border-radius: 4px;
            border: none;
            margin-right: 5px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
        }
        #my-id {
            font-weight: bold;
            color: #ffc107;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h2>WebRTC P2P Camera</h2>

    <div class="controls">
        <div id="my-id">Menghubungkan ke server...</div>
        <input type="text" id="remote-id" placeholder="Masukkan ID teman">
        <button id="btn-call">Hubungkan ke Teman</button>
    </div>

    <div class="video-grid">
        <div>
            <p>Kamera Saya</p>
            <video id="local-video" autoplay muted playsinline></video>
        </div>
        <div>
            <p>Kamera Lawan</p>
            <video id="remote-video" autoplay playsinline></video>
        </div>
    </div>

    <script>
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const btnCall = document.getElementById('btn-call');
        const remoteIdInput = document.getElementById('remote-id');
        const myIdDisplay = document.getElementById('my-id');

        let localStream;
        
        // 1. Inisialisasi PeerJS
        const peer = new Peer();

        // 2. Dapatkan ID sendiri dari server PeerJS
        peer.on('open', (id) => {
            myIdDisplay.innerText = "ID Anda: " + id;
            console.log('My ID is: ' + id);
        });

        // 3. Akses Kamera Lokal
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                localVideo.srcObject = stream;
            })
            .catch(err => {
                console.error("Gagal akses kamera: ", err);
                alert("Harap izinkan akses kamera");
            });

        // 4. MENERIMA PANGGILAN
        peer.on('call', (call) => {
            // Jawab panggilan dengan stream kita
            call.answer(localStream);
            
            // Terima stream dari lawan
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
            });
        });

        // 5. MELAKUKAN PANGGILAN
        btnCall.addEventListener('click', () => {
            const remoteId = remoteIdInput.value;
            if (!remoteId) return alert("Masukkan ID lawan dulu!");

            const call = peer.call(remoteId, localStream);
            
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
            });
        });

        // Tangani Error
        peer.on('error', (err) => {
            console.error(err);
            alert("Error: " + err.type);
        });
    </script>
</body>
</html>
